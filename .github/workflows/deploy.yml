name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 5m
          script: |
            set -e

            cd ~/padre-tracker

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main
            git log --oneline -1

            echo "=== Installing Python deps ==="
            .venv/bin/pip install -r requirements.txt -q

            echo "=== Building frontend ==="
            cd frontend
            npm ci --silent
            npm run build
            cd ..

            echo "=== Checking systemd unit drift ==="
            drift=0
            for svc in padre-dashboard padre-tracker; do
              if ! diff -q "$svc.service" "/etc/systemd/system/$svc.service" >/dev/null 2>&1; then
                drift=1
                echo "!!! $svc.service drifted — manual sync required on server"
              fi
            done

            echo "=== Restarting services ==="
            sudo systemctl restart padre-tracker
            sudo systemctl restart padre-dashboard

            echo "=== Health check ==="
            sleep 3
            systemctl is-active padre-tracker padre-dashboard

            [ "$drift" = "1" ] && echo "WARNING: systemd unit drift detected" || true

            echo "=== Deployment complete ==="
